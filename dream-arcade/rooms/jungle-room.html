<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Jungle Mix Room</title>

  <link rel="stylesheet" href="../arcade.css" />
</head>

<body>

  <div class="custom-cursor"></div>

  <div id="loadingScreen">
    <div class="loading-content">
      <p>LOADING JUNGLE MIX STATION...</p>
      <p>CHECKING MEMORY CARD...</p>
      <p>SIGNAL FOUND</p>
    </div>
  </div>

  <audio id="bgMusic" loop></audio>

  <main class="jungle-room">

    <div class="scanlines"></div>
    <div class="jungle-fog"></div>
    <div class="pixel-noise"></div>

    <div class="vhs-particles">
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
</div>

    <a href="../index.html" class="back-button">← BACK TO ARCADE</a>

    <h1 class="jungle-title">JUNGLE MIX STATION</h1>

    <button id="musicButton" class="ps-button">
      ✖ ENTER JUNGLE MIX
    </button>

    <div class="ps1-hud">
      <span>MEMORY CARD: OK</span>
      <span>SIGNAL: JUNGLE</span>
    </div>

    <div class="jungle-zone crt-zone" data-message="CRT: NOW PLAYING... DEEP IN THE JUNGLE">
      <img id="crtMixImage" class="crt-mix-image" src="../rooms/img/ambient breabeat vocal.jpg" alt="Mix artwork">
        <div class="crt-static"></div>

        <div class="crt-content">
          <img id="crtMixImage" class="crt-mix-image" src="" alt="Mix artwork">
          <p class="crt-now-playing">NOW PLAYING</p>
          <h2 id="crtTrackName">JUNGLE MIX 01</h2>
          <p class="crt-status">SIGNAL STABLE</p>
        </div>
      </div>
    </div>

    <button
  class="jungle-zone mix-one"
  data-audio="../assets/audio/mix-01.mp3"
  data-image="../assets/images/mix-01.png"
  data-message="MIX 01 SELECTED: Fast drums. Soft memories."
>
  MIX 01
</button>

<button
  class="jungle-zone mix-two"
  data-audio="../assets/audio/mix-02.mp3"
  data-image="../assets/images/mix-02.png"
  data-message="MIX 02 SELECTED: Bass echoes through the trees."
>
  MIX 02
</button>

    <button
      class="jungle-zone npc-zone"
      data-message="NPC: This place only appears when the beat finds you."
    >
      NPC
    </button>

    <button
    class="jungle-zone boombox-zone"
      data-message="The boombox crackles... but the signal is still alive."
    >
      BOOMBOX
    </button>

    <button
      class="jungle-zone secret-zone"
      data-message="??? You found an old hidden tape under the leaves."
    >
      SECRET
    </button>

    <div class="equalizer">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>

    <div class="jungle-dialogue" id="jungleDialogue">
      Move through the jungle mix station...
    </div>

  </main>

  <script src="../script.js"></script>
</body>
</html>
