<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Alien Room</title>

  <link rel="stylesheet" href="../arcade.css" />
</head>

<body>

  <div class="room-loader alien-loader">

  <div id="roomLoader" class="room-loader alien-loader">
  <div class="room-loader-content">
    <p>SEARCHING UNKNOWN LIFEFORM...</p>
    <p>GALACTIC SIGNAL FOUND...</p>
    <p>WELCOME TO ALIEN WORLD</p>
  </div>
</div>

  <div class="custom-cursor"></div>

  <main class="alien-room">

    <div class="scanlines"></div>
    <div class="pixel-noise"></div>

    <div class="space-stars">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>

    <div class="alien-radar">
      LIFEFORM FOUND
    </div>

    <audio
      id="alienAmbient"
      src="./asset audio/alien-world.mp3"
      loop
    ></audio>

    <a href="../index.html" class="back-button">
      ← BACK TO ARCADE
    </a>

    <h1 class="alien-title">
      SECTOR X-51
    </h1>

    <div class="alien-dialogue">
      Signal found... unknown life detected.
    </div>

  </main>

  <script src="../script.js"></script>

</body>
</html>
