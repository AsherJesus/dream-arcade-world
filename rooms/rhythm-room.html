<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Rhythm Room</title>

  <link rel="stylesheet" href="../arcade.css" />
</head>

<body>

  <div class="custom-cursor"></div>

  <main class="rhythm-room">

    <div class="scanlines"></div>
    <div class="pixel-noise"></div>

    <div class="moving-clouds">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <div class="seagulls">
      <span>🕊</span>
      <span>🕊</span>
      <span>🕊</span>
    </div>

    <a href="../index.html" class="back-button">
      ← BACK TO ARCADE
    </a>

    <h1 class="rhythm-title">
      RHYTHM SELECT
    </h1>

    <div class="jukebox-screen">

      <button class="arrow left-arrow">◀</button>

      <div class="music-display">
        <img
          id="rhythmImage"
          src="./img/ddr beach-love.png"
          alt="Rhythm Mix"
        />

        <h2 id="rhythmTrack">
          BEACH LOVE
        </h2>
      </div>

      <button class="arrow right-arrow">▶</button>

    </div>

    <div class="rhythm-dialogue">
      Warm beach sunset rhythm loaded.
    </div>

    <div class="free-play">
      FREE PLAY
    </div>

    <div class="arcade-info">
      <span>STAGE 01</span>
      <span id="bpmCounter">118 BPM</span>
      <span>PLAYER 1 READY</span>
    </div>

    <audio id="rhythmAudio"></audio>

    <audio
      id="menuClick"
      src="../assets/audio/sfx/menu-click.mp3"
    ></audio>

  </main>

  <script src="../script.js"></script>

</body>
</html>
