<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Depth Room</title>

  <link rel="stylesheet" href="../arcade.css" />
</head>

<body>

  <div class="room-loader depth-loader">

 <div id="roomLoader" class="room-loader depth-loader">
  <div class="room-loader-content">
    <p>DIVING BELOW MEMORY LEVEL...</p>
    <p>DREAM WAVES DETECTED...</p>
    <p>WELCOME TO THE DEPTHS</p>
  </div>
</div>

  <div class="page-transition"></div>

  <div class="custom-cursor"></div>

  <main class="depth-room">

    <div class="depth-background"></div>

    <div class="depth-layer layer-one"></div>
    <div class="depth-layer layer-two"></div>
    <div class="depth-layer layer-three"></div>

    <div class="depth-light"></div>

    <div class="depth-floating">
      <span>△</span>
      <span>◯</span>
      <span>✕</span>
      <span>▢</span>
    </div>

    <div class="depth-messages">
      <p>MEMORY FRAGMENT FOUND</p>
      <p>SIGNAL UNSTABLE</p>
      <p>YOU HAVE BEEN HERE BEFORE</p>
    </div>

    <h1 class="depth-title">
      MEMORY DEPTH
    </h1>

    <p class="depth-text">
      This room reacts to your movement...
    </p>

    <a href="../index.html" class="back-button">
      ← EXIT DEPTH
    </a>

    <audio
      id="depthAmbient"
      src="./asset audio/ps1-mainmenu.mp3"
      loop
    ></audio>

  </main>

  <script src="../script.js"></script>

</body>
</html>
