<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Rhythm Room</title>

  <link rel="stylesheet" href="../arcade.css" />
</head>

<body>

  <div class="custom-cursor"></div>

  <main class="rhythm-room">

    <div class="scanlines"></div>
    <div class="pixel-noise"></div>

    <a href="../index.html" class="back-button">
      ← BACK TO ARCADE
    </a>

    <h1 class="rhythm-title">
      RHYTHM SELECT
    </h1>

    <div class="jukebox-screen">

      <button class="arrow up-arrow">
        ▲
      </button>

      <div class="music-display">

        <img
          id="rhythmImage"
          src="./img/mix-01.png"
          alt="Rhythm Mix"
        />

        <h2 id="rhythmTrack">
          DREAM SIGNAL
        </h2>

      </div>

      <button class="arrow down-arrow">
        ▼
      </button>

    </div>

    <div class="rhythm-dialogue">
      Tropical rhythm signal detected...
    </div>

  </main>

  <script src="../script.js"></script>

</body>
</html>
