<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dream Arcade</title>
  <link rel="stylesheet" href="./arcade.css" />
</head>
<body>
  <div class="custom-cursor"></div>

  <main class="arcade-room">

    <div class="grain"></div>
    <div class="fog fog-one"></div>
    <div class="fog fog-two"></div>

    <h1 class="neon-sign">DREAM ARCADE</h1>

    <button class="hotspot arcade-machine" data-message="The machine is still running... but nobody is playing.">
      🕹️
    </button>

  <a href="./rooms/jungle-room.html" class="hotspot jungle-poster">
  🌴
</a>

    <button class="hotspot npc" data-message="NPC: I was waiting here. You came back different this time.">
      👾
    </button>

    <button class="hotspot radio" data-message="A low jungle beat leaks through the static...">
      📻
    </button>

    <button class="hotspot exit-door" data-message="The door is locked. Maybe the arcade wants you to stay longer.">
      🚪
    </button>

    <div class="dialogue-box" id="dialogueBox">
      Click around the room...
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
